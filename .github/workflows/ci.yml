name: CI

on:
  pull_request:
    branches:
      - main
      - renovate-github/**
  push:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Validate
        uses: rinchsan/renovate-config-validator@v0.2.1
