name: CI

on:
  pull_request:
    branches:
      - main
      - renovate-github/**
  push:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate
        uses: rinchsan/renovate-config-validator@v0.2.1
